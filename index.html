<script>
"use strict";

const SB_URL = "https://jvhcgllunsfncjintjba.supabase.co";
const SB_KEY = "sb_publishable_nWh8Ixmel4JrlaK4D2hK0w_iZ4k_nxl";
const threadCache = new Map();
let currentResults = [];
let currentKeyword = "";

/* ===================== Supabase ===================== */
async function sbFetch(path) {
  const r = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ===================== XSS ===================== */
function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* ===================== 日時フォーマット（曜日付き）===================== */
const DAYS = ["日","月","火","水","木","金","土"];
function fmtDate(str) {
  if (!str) return "";
  const d = new Date(str);
  if (isNaN(d)) return "";
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const dw = DAYS[d.getDay()];
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  const ss = String(d.getSeconds()).padStart(2,"0");
  return `${yy}/${mm}/${dd}(${dw}) ${hh}:${mi}:${ss}`;
}

/* ===================== DOMハイライト（XSS安全）===================== */
function getWords(q) {
  if (!q) return [];
  const m = q.match(/^id:\s*(.+)/i);
  return (m ? m[1].trim() : q).split(/\s+/).filter(Boolean);
}
function hlDOM(el, q) {
  const words = getWords(q);
  if (words.length) walkNodes(el, words);
}
function walkNodes(node, words) {
  if (node.nodeType === 3) { // TEXT_NODE
    const txt = node.textContent;
    if (!words.some(w => txt.toLowerCase().includes(w.toLowerCase()))) return;
    const pattern = words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|");
    const re = new RegExp(`(${pattern})`, "gi");
    const parts = txt.split(re);
    if (parts.length <= 1) return;
    const frag = document.createDocumentFragment();
    parts.forEach((p, i) => {
      if (i % 2 === 1) {
        const s = document.createElement("span");
        s.className = "highlight"; s.textContent = p;
        frag.appendChild(s);
      } else if (p) {
        frag.appendChild(document.createTextNode(p));
      }
    });
    node.parentNode.replaceChild(frag, node);
  } else if (node.nodeType === 1 && !["SCRIPT","STYLE","TEXTAREA","INPUT"].includes(node.tagName)) {
    Array.from(node.childNodes).forEach(c => walkNodes(c, words));
  }
}

/* ===================== 安価変換（escapeHtml済みHTML用）===================== */
function processAnchors(html, tid) {
  const id = parseInt(tid, 10);
  if (isNaN(id)) return html;
  return html.replace(/(&gt;&gt;|&gt;)(\d+)/g, (m, gt, n) => {
    const pn = parseInt(n, 10);
    if (isNaN(pn) || pn <= 0) return m;
    return `<span class="anchor-link" data-pn="${pn}" data-tid="${id}">${m}</span>`;
  });
}

/* ===================== メディア埋め込み ===================== */
function embedMedia(html) {
  html = html.replace(
    /https?:\/\/(?:i\.)?imgur\.com\/([a-zA-Z0-9]{5,12})(?:\.[a-zA-Z]{2,4})?(?=[<\s\n]|&|$)/g,
    (u, id) => `<div class="media-embed"><img src="https://i.imgur.com/${id}.jpg" loading="lazy" alt="imgur" onerror="this.parentElement.style.display='none'"></div>${u}`
  );
  html = html.replace(
    /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    (u, vid) => `<div class="media-embed"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy" title="YouTube"></iframe></div>${u}`
  );
  return html;
}

/* ===================== ボタン生成ヘルパー ===================== */
function mkBtn(text, cls) {
  const b = document.createElement("button");
  b.className = cls; b.textContent = text; return b;
}

/* ===================== レス要素生成（完全DOM操作・XSS安全）===================== */
// 表示形式: 57: 名無しさん＠おーぷん | 時刻: 25/09/30(火) 13:00:57 | ID:hbrM 主
function createPost(post, threadInfo, q, showRange) {
  const div = document.createElement("div");
  div.className = "post";
  div.dataset.pn = post.post_num;

  /* -- メタ行 -- */
  const meta = document.createElement("div");
  meta.className = "post-meta";

  // レス番
  const numEl = document.createElement("span");
  numEl.className = "post-num";
  numEl.textContent = String(post.post_num);
  numEl.title = "元スレで開く";
  numEl.addEventListener("click", () =>
    window.open(`https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${threadInfo.thread_id}/${post.post_num}-`, "_blank")
  );
  meta.appendChild(numEl);
  meta.appendChild(document.createTextNode(": "));

  // 名前
  const nameEl = document.createElement("span");
  nameEl.className = "post-author";
  nameEl.textContent = post.name || "名無し";
  meta.appendChild(nameEl);

  // 時刻
  meta.appendChild(document.createTextNode(" | 時刻: "));
  const timeEl = document.createElement("span");
  timeEl.className = "post-time";
  timeEl.textContent = fmtDate(post.posted_at);
  meta.appendChild(timeEl);

  // ID
  meta.appendChild(document.createTextNode(" | ID:"));
  const idEl = document.createElement("span");
  idEl.className = "post-id";
  idEl.textContent = post.user_id || "";
  meta.appendChild(idEl);

  // 主バッジ
  if (post.is_nusi) {
    meta.appendChild(document.createTextNode(" "));
    const nEl = document.createElement("span");
    nEl.className = "post-nusi"; nEl.textContent = "主";
    meta.appendChild(nEl);
  }

  /* -- ボタン -- */
  const btns = document.createElement("div");
  btns.className = "post-buttons";

  if (showRange) {
    const up = mkBtn("上100","btn btn-secondary btn-sm");
    up.dataset.pn = post.post_num;
    up.addEventListener("click", e => { e.stopPropagation(); if (!up.disabled) loadRange(up,"up",threadInfo.thread_id,q); });
    btns.appendChild(up);

    const dn = mkBtn("下100","btn btn-secondary btn-sm");
    dn.dataset.pn = post.post_num;
    dn.addEventListener("click", e => { e.stopPropagation(); if (!dn.disabled) loadRange(dn,"down",threadInfo.thread_id,q); });
    btns.appendChild(dn);
  }

  const cpBtn = mkBtn("コピペ","btn btn-copy btn-sm");
  const cpText = `${post.post_num}: ${post.name||"名無し"} | 時刻: ${fmtDate(post.posted_at)} | ID:${post.user_id||""}${post.is_nusi?" 主":""}\n${(post.body||"").trim()}`;
  cpBtn.addEventListener("click", e => {
    e.stopPropagation();
    navigator.clipboard.writeText(cpText)
      .then(()=>{ cpBtn.textContent="コピー完了!"; setTimeout(()=>cpBtn.textContent="コピペ",1300); })
      .catch(()=>prompt("コピーしてください:",cpText));
  });
  btns.appendChild(cpBtn);
  meta.appendChild(btns);
  div.appendChild(meta);

  /* -- 本文 -- */
  const cont = document.createElement("div");
  cont.className = "post-content";
  let bhtml = esc((post.body||"").trim());
  bhtml = processAnchors(bhtml, threadInfo.thread_id);
  bhtml = embedMedia(bhtml);
  cont.innerHTML = bhtml; // esc済み + 安全タグのみ

  // DOMベースハイライト
  if (q) { hlDOM(nameEl, q); hlDOM(idEl, q); hlDOM(cont, q); }

  div.appendChild(cont);
  return div;
}

/* ===================== 安価イベント ===================== */
function addAnchors(container, tid) {
  const prev = document.getElementById("anchorPreview");
  const pMeta = document.getElementById("apMeta");
  const pBody = document.getElementById("apBody");

  container.querySelectorAll(".anchor-link").forEach(link => {
    link.addEventListener("mouseenter", async e => {
      const pn = parseInt(e.target.dataset.pn, 10);
      const threadId = parseInt(e.target.dataset.tid, 10);
      const posts = await fetchPosts(threadId).catch(()=>[]);
      const p = posts.find(x => x.post_num === pn);
      if (!p) return;
      pMeta.textContent = `${pn}: ${p.name||"名無し"} | ID:${p.user_id||""}`;
      pBody.textContent = (p.body||"").trim().slice(0,250) + ((p.body||"").length>250?"…":"");
      prev.style.display = "block";
      posPreview(e);
    });
    link.addEventListener("mousemove", posPreview);
    link.addEventListener("mouseleave", () => prev.style.display = "none");
    link.addEventListener("click", async e => {
      e.preventDefault(); e.stopPropagation();
      const pn = parseInt(e.target.dataset.pn, 10);
      const threadId = parseInt(e.target.dataset.tid, 10);
      await jumpToPost(pn, threadId, e.target);
    });
  });
}

function posPreview(e) {
  const el = document.getElementById("anchorPreview");
  const vw = innerWidth, vh = innerHeight;
  let x = e.clientX + 14, y = e.clientY - 10;
  const pw = 380, ph = el.offsetHeight || 100;
  if (x + pw > vw) x = e.clientX - pw - 14;
  if (y + ph > vh) y = e.clientY - ph - 10;
  el.style.left = Math.max(4,x) + "px";
  el.style.top  = Math.max(4,y) + "px";
}

/* 安価クリック: 安価を含むレスの直後に展開（修正済み）*/
async function jumpToPost(pn, tid, anchorEl) {
  // スコープ（thread-details か thread-detail-posts）内で既存レスを探す
  const scope = anchorEl.closest(".thread-details, .thread-detail-posts");

  if (scope) {
    const existing = scope.querySelector(`.post[data-pn="${pn}"]`);
    if (existing) {
      flashEl(existing);
      existing.scrollIntoView({ behavior:"smooth", block:"center" });
      return;
    }
  }

  const posts = await fetchPosts(tid).catch(()=>[]);
  const p = posts.find(x => x.post_num === pn);
  if (!p) return;

  const newEl = createPost(p, { thread_id: tid }, currentKeyword, false);
  addAnchors(newEl, tid);

  // ▼ 安価リンクを含む .post 要素の直後に挿入する（ここが修正ポイント）
  const parentPost = anchorEl.closest(".post");
  if (parentPost && parentPost.parentNode) {
    parentPost.insertAdjacentElement("afterend", newEl);
  } else if (scope) {
    scope.appendChild(newEl);
  }

  flashEl(newEl);
  newEl.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

function flashEl(el) {
  el.classList.remove("flash-post");
  void el.offsetWidth;
  el.classList.add("flash-post");
}

/* ===================== 全レス取得（キャッシュ付き）===================== */
async function fetchPosts(threadId) {
  const id = parseInt(threadId, 10);
  if (threadCache.has(id)) return threadCache.get(id);
  const ps = await sbFetch(
    `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&thread_id=eq.${id}&order=post_num.asc&limit=2000`
  );
  threadCache.set(id, ps);
  return ps;
}

/* ===================== 上100・下100 ===================== */
async function loadRange(btn, dir, tid, q) {
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = "読込中…";
  const pn = parseInt(btn.dataset.pn, 10);
  const s = dir === "up" ? Math.max(1, pn-100) : pn+1;
  const e = dir === "up" ? pn-1 : pn+100;
  if (s > e) { btn.textContent = orig; btn.disabled = false; return; }

  const posts = await sbFetch(
    `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi` +
    `&thread_id=eq.${tid}&post_num=gte.${s}&post_num=lte.${e}&order=post_num.asc`
  ).catch(()=>[]);

  const wrap = document.createElement("div");
  wrap.className = "range-posts";
  posts.forEach(p => wrap.appendChild(createPost(p, { thread_id: tid }, q, false)));
  addAnchors(wrap, tid);

  const postDiv = btn.closest(".post");
  if (dir === "up" && postDiv?.parentNode) {
    const sy = scrollY, rt = postDiv.getBoundingClientRect().top;
    postDiv.parentNode.insertBefore(wrap, postDiv);
    window.scrollTo(0, sy + (postDiv.getBoundingClientRect().top - rt));
  } else if (postDiv?.parentNode) {
    postDiv.parentNode.insertBefore(wrap, postDiv.nextSibling);
  }
  btn.textContent = orig; // disabled のまま（連打防止）
}

/* ===================== 検索ロジック ===================== */
function words(q) { return q.split(/\s+/).filter(Boolean); }

async function doSearch(q) {
  q = (q !== undefined ? q : document.getElementById("topInput").value.trim());
  if (!q) return;

  currentKeyword = q;
  document.getElementById("topPage").classList.add("hidden");
  document.getElementById("resultPage").classList.add("active");
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("resultInput").value = q;
  document.getElementById("detailInput").value = q;

  const type = document.querySelector('input[name="searchType"]:checked').value;
  const mode = document.querySelector('input[name="searchMode"]:checked').value;
  updateUrl(q, type, mode);

  document.getElementById("results").innerHTML = `<div class="loading">検索中… <span class="spinner"></span></div>`;
  document.getElementById("resultStats").textContent = "";
  document.getElementById("searchSummary").style.display = "none";
  document.getElementById("sortBar").classList.remove("visible");

  const t0 = performance.now();
  try {
    let res = [];
    if (type === "title") res = await searchTitle(q, mode);
    else if (type === "body") res = await searchBody(q, mode);
    else {
      const [tr, br] = await Promise.all([searchTitle(q,mode), searchBody(q,mode)]);
      const m = new Map();
      tr.forEach(r => m.set(r.thread_id, r));
      br.forEach(r => {
        if (m.has(r.thread_id)) {
          const ex = m.get(r.thread_id);
          const ns = new Set(ex.matchedPosts.map(p => p.post_num));
          r.matchedPosts.forEach(p => { if (!ns.has(p.post_num)) ex.matchedPosts.push(p); });
          ex.matchedPosts.sort((a,b)=>a.post_num-b.post_num);
          ex.titleMatch = ex.titleMatch || r.titleMatch;
        } else m.set(r.thread_id, r);
      });
      res = Array.from(m.values());
    }
    currentResults = res;
    renderSorted(q, ((performance.now()-t0)/1000).toFixed(2));
  } catch(err) {
    document.getElementById("results").innerHTML = `<div class="no-results">エラー: ${esc(err.message)}</div>`;
  }
}

async function searchTitle(q, mode) {
  const ws = words(q);
  if (!ws.length) return [];
  let threads;
  if (mode === "or" && ws.length > 1) {
    const sets = await Promise.all(
      ws.map(w => sbFetch(`threads?select=thread_id,title,updated_at&limit=200&title=ilike.${encodeURIComponent("%"+w+"%")}`))
    );
    const m = new Map();
    sets.flat().forEach(t => m.set(t.thread_id, t));
    threads = Array.from(m.values());
  } else {
    let qstr = `threads?select=thread_id,title,updated_at&limit=200&order=updated_at.desc`;
    ws.forEach(w => { qstr += `&title=ilike.${encodeURIComponent("%"+w+"%")}`; });
    threads = await sbFetch(qstr);
    if (mode === "and" && ws.length > 1)
      threads = threads.filter(t => ws.every(w => t.title.toLowerCase().includes(w.toLowerCase())));
  }
  return threads.map(t => ({ thread_id:t.thread_id, title:t.title, updated_at:t.updated_at, matchedPosts:[], titleMatch:true }));
}

async function searchBody(q, mode) {
  const ws = words(q);
  if (!ws.length) return [];

  // ID検索
  const idM = q.match(/^id:\s*(.+)/i);
  if (idM) {
    const tid = idM[1].trim();
    const ps = await sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&user_id=ilike.${encodeURIComponent("%"+tid+"%")}&limit=500&order=posted_at.desc`);
    return groupPosts(ps);
  }

  let all;
  if (mode === "or" && ws.length > 1) {
    const sets = await Promise.all(
      ws.flatMap(w => {
        const e = encodeURIComponent("%"+w+"%");
        const base = `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi`;
        return [
          sbFetch(`${base}&body=ilike.${e}&limit=200&order=posted_at.desc`),
          sbFetch(`${base}&name=ilike.${e}&limit=200&order=posted_at.desc`),
          sbFetch(`${base}&user_id=ilike.${e}&limit=200&order=posted_at.desc`)
        ];
      })
    );
    const m = new Map();
    sets.flat().forEach(p => m.set(`${p.thread_id}_${p.post_num}`, p));
    all = Array.from(m.values());
  } else {
    const w0 = ws[0];
    const e0 = encodeURIComponent("%"+w0+"%");
    const base = `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi`;
    const [bp,np,ip] = await Promise.all([
      sbFetch(`${base}&body=ilike.${e0}&limit=300&order=posted_at.desc`),
      sbFetch(`${base}&name=ilike.${e0}&limit=300&order=posted_at.desc`),
      sbFetch(`${base}&user_id=ilike.${e0}&limit=300&order=posted_at.desc`)
    ]);
    const m = new Map();
    [...bp,...np,...ip].forEach(p => m.set(`${p.thread_id}_${p.post_num}`, p));
    all = Array.from(m.values());
    if (mode === "and" && ws.length > 1) {
      all = all.filter(p => {
        const txt = `${p.body||""} ${p.name||""} ${p.user_id||""}`.toLowerCase();
        return ws.every(w => txt.includes(w.toLowerCase()));
      });
    }
  }
  return groupPosts(all);
}

async function groupPosts(posts) {
  if (!posts.length) return [];
  const ids = [...new Set(posts.map(p => p.thread_id))];
  const tmap = new Map();
  for (let i = 0; i < ids.length; i += 20) {
    const batch = ids.slice(i,i+20);
    if (!batch.length) continue;
    const ts = await sbFetch(`threads?select=thread_id,title,updated_at&thread_id=in.(${batch.join(",")})`).catch(()=>[]);
    ts.forEach(t => tmap.set(t.thread_id, t));
  }
  const m = new Map();
  posts.forEach(p => {
    if (!m.has(p.thread_id)) {
      const t = tmap.get(p.thread_id) || {};
      m.set(p.thread_id, { thread_id:p.thread_id, title:t.title||`スレッド ${p.thread_id}`, updated_at:t.updated_at||p.posted_at, matchedPosts:[], titleMatch:false });
    }
    m.get(p.thread_id).matchedPosts.push(p);
  });
  m.forEach(r => r.matchedPosts.sort((a,b)=>a.post_num-b.post_num));
  return Array.from(m.values());
}

/* ===================== ソート・描画 ===================== */
function renderSorted(q, elapsed) {
  const order = document.querySelector('input[name="sortOrder"]:checked').value;
  const sorted = sortRes([...currentResults], order);
  const total = sorted.reduce((s,r)=>s+r.matchedPosts.length,0);

  document.getElementById("resultStats").textContent =
    `約 ${sorted.length} スレッド・${total} レスヒット (${elapsed} 秒)`;

  if (!sorted.length) {
    document.getElementById("results").innerHTML = `<div class="no-results">「${esc(q)}」に一致する結果はありませんでした。</div>`;
    document.getElementById("searchSummary").style.display = "none";
    document.getElementById("sortBar").classList.remove("visible");
    return;
  }

  document.getElementById("sortBar").classList.add("visible");
  const sum = document.getElementById("searchSummary");
  sum.textContent = "";
  const strong = document.createElement("strong"); strong.textContent = q;
  sum.append("検索: 「", strong, `」 | ヒット: ${sorted.length}スレッド, ${total}レス`);
  sum.style.display = "block";

  renderResults(sorted, q);
}

function sortRes(results, order) {
  if (order === "newest")    return results.sort((a,b)=>new Date(b.updated_at||0)-new Date(a.updated_at||0));
  if (order === "oldest")    return results.sort((a,b)=>new Date(a.updated_at||0)-new Date(b.updated_at||0));
  if (order === "relevance") return results.sort((a,b)=>b.matchedPosts.length-a.matchedPosts.length);
  return results;
}

function renderResults(results, q) {
  const cont = document.getElementById("results");
  cont.innerHTML = "";

  results.forEach(thread => {
    const card = document.createElement("div");
    card.className = "thread-result";

    /* ヘッダー */
    const header = document.createElement("div");
    header.className = "thread-header";

    const tarea = document.createElement("div");
    tarea.className = "thread-title-area";

    const titleSp = document.createElement("span");
    titleSp.className = "thread-title";
    titleSp.textContent = thread.title || `スレッド ${thread.thread_id}`;
    if (q) hlDOM(titleSp, q);
    tarea.appendChild(titleSp);

    const urlDiv = document.createElement("div");
    urlDiv.className = "thread-url";
    urlDiv.textContent = `hayabusa.open2ch.net › livejupiter › ${thread.thread_id}`;
    tarea.appendChild(urlDiv);

    const date = thread.updated_at ? new Date(thread.updated_at).toLocaleDateString("ja-JP") : "";
    const metaDiv = document.createElement("div");
    metaDiv.className = "thread-meta-line";
    metaDiv.textContent = `更新: ${date}`;
    if (thread.titleMatch && !thread.matchedPosts.length) {
      const badge = document.createElement("span");
      badge.style.color = "#34a853"; badge.textContent = " · スレタイ一致";
      metaDiv.appendChild(badge);
    }
    tarea.appendChild(metaDiv);
    header.appendChild(tarea);

    const badgeArea = document.createElement("div");
    badgeArea.className = "thread-badge-area";
    const badge = document.createElement("span");
    if (thread.matchedPosts.length) {
      badge.className = "badge-match"; badge.textContent = `${thread.matchedPosts.length}件ヒット`;
    } else {
      badge.className = "badge-total"; badge.style.color = "#34a853"; badge.textContent = "タイトル一致";
    }
    badgeArea.appendChild(badge);
    header.appendChild(badgeArea);

    const arrow = document.createElement("span");
    arrow.className = "thread-header-arrow"; arrow.textContent = "▼";
    header.appendChild(arrow);

    /* 詳細エリア */
    const details = document.createElement("div");
    details.className = "thread-details";
    buildDetails(details, thread, q);

    header.addEventListener("click", () => {
      const open = details.style.display === "block";
      details.style.display = open ? "none" : "block";
      arrow.classList.toggle("open", !open);
    });

    card.appendChild(header);
    card.appendChild(details);
    cont.appendChild(card);
  });
}

function buildDetails(details, thread, q) {
  const actionBar = document.createElement("div");
  actionBar.className = "thread-action-bar";

  const extLink = document.createElement("a");
  extLink.className = "thread-ext-link";
  extLink.href = `https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${thread.thread_id}/`;
  extLink.target = "_blank"; extLink.rel = "noopener noreferrer";
  extLink.textContent = "↗ 元スレを開く";
  actionBar.appendChild(extLink);

  const showAllBtn = mkBtn("全レス表示", "btn btn-success btn-sm");
  const showNewBtn = mkBtn("別ページで全表示", "btn btn-newpage btn-sm");

  const postsWrap = document.createElement("div");
  postsWrap.className = "posts-container";

  showAllBtn.addEventListener("click", e => {
    e.stopPropagation();
    showAllBtn.style.display = "none"; showNewBtn.style.display = "none";
    viewAllInline(thread.thread_id, postsWrap, q);
  });
  showNewBtn.addEventListener("click", e => { e.stopPropagation(); openDetailPage(thread.thread_id); });

  actionBar.appendChild(showAllBtn);
  actionBar.appendChild(showNewBtn);
  details.appendChild(actionBar);

  if (thread.titleMatch && !thread.matchedPosts.length) {
    const msg = document.createElement("p");
    msg.style.cssText = "color:#5f6368;font-size:13px;padding:8px 0;";
    msg.textContent = "スレッドタイトルが一致しました。「全レス表示」でレスを確認できます。";
    postsWrap.appendChild(msg);
  } else {
    thread.matchedPosts.forEach(p => postsWrap.appendChild(createPost(p, thread, q, true)));
    addAnchors(postsWrap, thread.thread_id);
  }
  details.appendChild(postsWrap);
}

async function viewAllInline(tid, wrap, q) {
  wrap.innerHTML = `<div class="loading">全レス読み込み中… <span class="spinner"></span></div>`;
  const ps = await fetchPosts(tid).catch(()=>[]);
  wrap.innerHTML = "";
  const cnt = document.createElement("div");
  cnt.style.cssText = "font-size:13px;color:#5f6368;padding:4px 0 8px;";
  cnt.textContent = `全${ps.length}レス`;
  wrap.appendChild(cnt);
  ps.forEach(p => wrap.appendChild(createPost(p, { thread_id: tid }, q, false)));
  addAnchors(wrap, tid);
}

async function openDetailPage(tid) {
  document.getElementById("resultPage").classList.remove("active");
  document.getElementById("threadDetailPage").classList.add("active");

  const div = document.getElementById("threadDetailPosts");
  div.innerHTML = `<div class="loading">読み込み中… <span class="spinner"></span></div>`;

  const [tarr, ps] = await Promise.all([
    sbFetch(`threads?select=thread_id,title,updated_at&thread_id=eq.${parseInt(tid,10)}&limit=1`).catch(()=>[]),
    fetchPosts(tid).catch(()=>[])
  ]);
  const thread = tarr[0] || { thread_id: tid, title: `スレッド ${tid}` };
  const q = currentKeyword;
  div.innerHTML = "";

  const back = document.createElement("div");
  back.className = "back-btn"; back.textContent = "← 検索結果に戻る";
  back.addEventListener("click", goBack);
  div.appendChild(back);

  const h2 = document.createElement("h2");
  h2.style.cssText = "font-size:17px;font-weight:700;color:#202124;padding:4px 0;";
  h2.textContent = thread.title || `スレッド ${tid}`;
  div.appendChild(h2);

  const info = document.createElement("div");
  info.style.cssText = "font-size:13px;color:#5f6368;margin:4px 0 8px;";
  info.textContent = `全${ps.length}レス`;
  div.appendChild(info);

  const lnk = document.createElement("a");
  lnk.href = `https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${tid}/`;
  lnk.target = "_blank"; lnk.rel = "noopener noreferrer";
  lnk.style.cssText = "font-size:13px;color:#1a73e8;text-decoration:none;display:block;margin-bottom:12px;";
  lnk.textContent = "↗ 元スレを開く";
  div.appendChild(lnk);

  const wrap = document.createElement("div");
  wrap.className = "posts-container";
  ps.forEach(p => wrap.appendChild(createPost(p, thread, q, false)));
  div.appendChild(wrap);
  addAnchors(wrap, tid);
}

/* ===================== URL共有 ===================== */
const T2P = { all:"subete", title:"suretai", body:"honbun" };
const P2T = { subete:"all", suretai:"title", honbun:"body" };
const M2P = { default:"tuuzyou", and:"and", or:"or" };
const P2M = { tuuzyou:"default", and:"and", or:"or" };

function updateUrl(q, type, mode) {
  const url = new URL(location.href);
  if (q) {
    url.searchParams.set("search", q);
    url.searchParams.set("type", T2P[type]||"subete");
    url.searchParams.set("mode", M2P[mode]||"tuuzyou");
  } else {
    ["search","type","mode"].forEach(k => url.searchParams.delete(k));
  }
  history.pushState({}, "", url.toString());
}

function checkUrl() {
  const p = new URLSearchParams(location.search);
  const q = p.get("search");
  const type = P2T[p.get("type")] || "all";
  const mode = P2M[p.get("mode")] || "default";
  const te = document.querySelector(`input[name="searchType"][value="${type}"]`);
  if (te) te.checked = true;
  const me = document.querySelector(`input[name="searchMode"][value="${mode}"]`);
  if (me) me.checked = true;
  if (q) { document.getElementById("topInput").value = q; doSearch(q); }
}

/* ===================== ナビ ===================== */
function goHome() {
  document.getElementById("topPage").classList.remove("hidden");
  document.getElementById("resultPage").classList.remove("active");
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("topInput").value = "";
  currentResults = []; currentKeyword = "";
  history.pushState({}, "", location.pathname);
  document.getElementById("topInput").focus();
}
function goBack() {
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("resultPage").classList.add("active");
}

["logoTop","logoResult","logoDetail"].forEach(id => document.getElementById(id).addEventListener("click", goHome));
document.getElementById("topSearchBtn").addEventListener("click", ()=>doSearch());
document.getElementById("topInput").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });
document.getElementById("resultInput").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(e.target.value.trim()); });

document.querySelectorAll('input[name="sortOrder"]').forEach(r =>

);
document.querySelectorAll('input[name="searchMode"],input[name="searchType"]').forEach(r =>

);

document.getElementById("shareBtn").addEventListener("click", ()=>{
  const btn = document.getElementById("shareBtn");
  navigator.clipboard.writeText(location.href)

    .catch(()=>prompt("URLをコピーしてください:", location.href));
});

window.addEventListener("popstate", checkUrl);
document.addEventListener("DOMContentLoaded", checkUrl);
