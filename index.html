<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeegle!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Hiragino Kaku Gothic ProN’, ‘ヒラギノ角ゴ ProN’, Meiryo, ‘MS Gothic’, Arial, sans-serif;

/* ===================== トップページ ===================== */
.top-page {
display: flex; flex-direction: column; align-items: center;
justify-content: center; min-height: 100vh;
}
.top-page.hidden { display: none; }

.logo {

}
.logo span:nth-child(1) { color: #4285F4; }
.logo span:nth-child(2) { color: #EA4335; }
.logo span:nth-child(3) { color: #FBBC05; }
.logo span:nth-child(4) { color: #4285F4; }
.logo span:nth-child(5) { color: #34A853; }
.logo span:nth-child(6) { color: #EA4335; }
.logo span:nth-child(7) { color: #FBBC05; }

.search-box {
display: flex; align-items: center;
width: 90%; max-width: 584px;
border: 1px solid #dfe1e5; border-radius: 24px;
padding: 10px 16px; background: #fff;
}
.search-box:hover, .search-box:focus-within {

}
.search-box svg { flex-shrink: 0; margin-right: 12px; color: #9aa0a6; }
.search-box input {
flex: 1; border: none; outline: none; font-size: 16px;
background: transparent;
font-family: inherit;
}
.search-btn-wrap { margin-top: 24px; }
.search-btn {
background: #f8f9fa; border: 1px solid #f8f9fa;
border-radius: 4px; color: #3c4043; cursor: pointer;
font-size: 14px; padding: 10px 20px; margin: 0 6px;
font-family: inherit;
}
.search-btn:hover { border-color: #dadce0; box-shadow: 0 1px 1px rgba(0,0,0,.1); }

/* ===================== 結果ページ ===================== */
.result-page { display: none; }
.result-page.active { display: block; }

.result-header {
display: flex; align-items: center;
padding: 12px 20px; border-bottom: 1px solid #ebebeb;
position: sticky; top: 0; background: #fff; z-index: 100;
gap: 16px;
}

.result-logo {
font-size: 28px; font-weight: bold; cursor: pointer;
white-space: nowrap; font-family: Arial, sans-serif;
}
.result-logo span:nth-child(1) { color: #4285F4; }
.result-logo span:nth-child(2) { color: #EA4335; }
.result-logo span:nth-child(3) { color: #FBBC05; }
.result-logo span:nth-child(4) { color: #4285F4; }
.result-logo span:nth-child(5) { color: #34A853; }
.result-logo span:nth-child(6) { color: #EA4335; }
.result-logo span:nth-child(7) { color: #FBBC05; }

.result-search-box {
display: flex; align-items: center;
flex: 1; max-width: 692px;
border: 1px solid #dfe1e5; border-radius: 24px;
padding: 8px 16px;
}
.result-search-box:focus-within {
box-shadow: 0 1px 6px rgba(32,33,36,.28);
border-color: transparent;
}
.result-search-box input {
flex: 1; border: none; outline: none; font-size: 16px;
font-family: inherit;
}
.result-search-box svg { flex-shrink: 0; margin-right: 10px; color: #9aa0a6; }

/* ===================== 検索オプションバー ===================== */
.search-options-bar {
background: #f8f9fa;
border-bottom: 1px solid #ebebeb;
padding: 8px 20px;
display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
font-size: 13px;
}

.option-group {
display: flex; align-items: center; gap: 8px;
}
.option-group strong {
color: #5f6368; font-size: 12px; white-space: nowrap;
}
.option-group label {

cursor: pointer; color: #3c4043; white-space: nowrap;
}
.option-group label:hover { color: #1a73e8; }
.option-group input[type=“radio”] { accent-color: #1a73e8; }

/* ===================== 統計・ソート ===================== */
.result-stats-bar {
padding: 8px 20px;

border-bottom: 1px solid #f1f3f4;
}
.result-stats {
color: #70757a; font-size: 13px; flex: 1;
}
.sort-bar {
display: none;
align-items: center; gap: 8px; font-size: 13px;
}
.sort-bar.visible { display: flex; }
.sort-bar strong { color: #5f6368; font-size: 12px; }
.sort-bar label { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; color: #3c4043; }
.sort-bar label:hover { color: #1a73e8; }
.sort-bar input[type=“radio”] { accent-color: #1a73e8; }

/* ===================== 検索サマリー ===================== */

/* ===================== 結果一覧 ===================== */

/* スレッドカード */

.thread-header {

}
.thread-header:hover { background: #f8f9fa; }

.thread-title-area { flex: 1; min-width: 0; }
.thread-title {

.thread-url {

}
.thread-meta-line {

.thread-badge-area {

.badge-total {

}
.badge-match {

/* スレッド詳細 */

.thread-action-bar {

.thread-ext-link {
font-size: 13px; color: #1a73e8; text-decoration: none;
}
.thread-ext-link:hover { text-decoration: underline; }

/* アクションボタン */
.btn {
padding: 5px 12px; border: none; border-radius: 4px;

}

.btn-primary:hover:not(:disabled) { background: #1557b0; }
.btn-success { background: #34a853; color: #fff; }
.btn-success:hover:not(:disabled) { background: #2d9248; }
.btn-secondary { background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; }
.btn-secondary:hover:not(:disabled) { background: #e8eaed; }
.btn-sm { padding: 3px 8px; font-size: 11px; }
.btn-copy { background: #17a2b8; color: #fff; }
.btn-copy:hover:not(:disabled) { background: #138496; }

/* レス */
.post {
border-top: 1px dashed #e0e0e0;
padding: 10px 0;
}
.post:first-child { border-top: none; }

.post-meta {
font-size: 12px; color: #5f6368; margin-bottom: 6px;
display: flex; align-items: flex-start; flex-wrap: wrap; gap: 6px;
}
.post-num {
font-weight: 700; color: #1a73e8; cursor: pointer;
flex-shrink: 0;
}
.post-num:hover { text-decoration: underline; }
.post-author {

}
.post-author:hover { text-decoration: underline; }
.post-sage { color: #888; font-size: 11px; }
.post-id { color: #5f6368; }
.post-time { color: #80868b; }
.post-nusi {

}

.post-buttons {

}

.post-content {
font-size: 14px; line-height: 1.65;
background: #fafafa; padding: 8px 10px;
border-radius: 4px; white-space: pre-wrap;

}

/* ハイライト */
.highlight { background: #ffeb3b; padding: 1px 2px; border-radius: 2px; }

/* 安価リンク */
.anchor-link {
color: #1a73e8; text-decoration: underline; cursor: pointer;
}
.anchor-preview {
position: fixed;
background: #fff; border: 2px solid #1a73e8; border-radius: 6px;

}
.anchor-preview .preview-meta {

}
.anchor-preview .preview-body {
white-space: pre-wrap; line-height: 1.5; color: #202124;
}

/* 範囲表示コンテナ */
.range-posts {
border-left: 3px solid #e8f0fe;
padding-left: 10px; margin: 4px 0;
}

/* ローディング */
.loading {
text-align: center; padding: 40px; color: #70757a; font-size: 14px;
}
.spinner {
display: inline-block; width: 18px; height: 18px;
border: 2px solid #e0e0e0; border-radius: 50%; border-top-color: #1a73e8;
animation: spin 0.8s linear infinite; margin-left: 8px;
vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 結果なし */
.no-results {
padding: 24px 0; color: #70757a; font-size: 14px; text-align: center;
}

/* スレッド詳細ビュー */
.thread-detail-page { display: none; }
.thread-detail-page.active { display: block; }

.thread-detail-header {
padding: 12px 20px; border-bottom: 1px solid #ebebeb;
background: #fff; position: sticky; top: 0; z-index: 100;
}
.thread-detail-title {
font-size: 17px; font-weight: 700; color: #202124; margin-top: 8px;
}
.thread-detail-info {
font-size: 13px; color: #5f6368; margin-top: 4px;
}
.thread-detail-posts {
padding: 12px 20px 40px; max-width: 900px;
}
.back-btn {
display: inline-flex; align-items: center; gap: 4px;
color: #1a73e8; font-size: 14px; cursor: pointer;
padding: 4px 0;
}
.back-btn:hover { text-decoration: underline; }

/* メディア埋め込み */
.media-embed { margin: 8px 0; border: 1px solid #dadce0; border-radius: 6px; overflow: hidden; }
.media-embed img { max-width: 100%; max-height: 400px; height: auto; display: block; }
.media-embed iframe { width: 100%; height: 360px; border: none; }

/* レスポンシブ */
@media (max-width: 640px) {
.result-header { padding: 8px 12px; gap: 8px; }
.result-logo { font-size: 22px; }
.search-options-bar { padding: 8px 12px; }

.thread-detail-posts { padding: 8px 12px 40px; }
.logo { font-size: 48px; }
.thread-header { padding: 10px 12px; }
.thread-details { padding: 0 12px 12px; }
.post-buttons { margin-left: 0; margin-top: 4px; width: 100%; }
}
</style>

<body>

<!-- ===================== トップページ ===================== -->

<div class="top-page" id="topPage">
  <div class="logo" onclick="goHome()">
    <span>J</span><span>e</span><span>e</span><span>g</span><span>l</span><span>e</span><span>!</span>
  </div>
  <div class="search-box">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

<div class="result-page" id="resultPage">
  <div class="result-header">
    <div class="result-logo" onclick="goHome()">
      <span>J</span><span>e</span><span>e</span><span>g</span><span>l</span><span>e</span><span>!</span>
    </div>
    <div class="result-search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="resultInput" autocomplete="off" placeholder="スレッド・レスを検索">
    </div>
  </div>

  <!-- 検索オプション -->

  <div class="search-options-bar">

      <label><input type="radio" name="searchMode" value="and"> AND</label>
      <label><input type="radio" name="searchMode" value="or"> OR</label>
    </div>
    <div class="option-group">
      <strong>検索範囲:</strong>
      <label><input type="radio" name="searchType" value="all" checked> 全て</label>
      <label><input type="radio" name="searchType" value="title"> スレタイ</label>

  <div class="result-header">

      <span>J</span><span>e</span><span>e</span><span>g</span><span>l</span><span>e</span><span>!</span>

</div>

<!-- 安価プレビュー（グローバル） -->

<div class="anchor-preview" id="anchorPreview" style="display:none;"></div>

<script>
const SB_URL = "https://jvhcgllunsfncjintjba.supabase.co";
const SB_KEY = "sb_publishable_nWh8Ixmel4JrlaK4D2hK0w_iZ4k_nxl";

// スレッドキャッシュ: thread_id -> posts[]
const threadCache = new Map();
// 現在の検索結果
let currentResults = [];
// 現在表示中のスレッドID（詳細ページ用）
let currentThreadId = null;
// 現在の検索キーワード
let currentKeyword = "";

// ===================== Supabase API =====================
async function sbFetch(path) {
  const r = await fetch(SB_URL + "/rest/v1/" + path, {
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ===================== 検索メイン =====================
async function doSearch(q) {
  q = (q !== undefined ? q : document.getElementById("topInput").value.trim());
  if (!q) return;

  currentKeyword = q;

  document.getElementById("topPage").classList.add("hidden");
  document.getElementById("resultPage").classList.add("active");
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("resultInput").value = q;
  document.getElementById("detailInput").value = q;

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = `<div class="loading">検索中… <span class="spinner"></span></div>`;
  document.getElementById("resultStats").textContent = "";
  document.getElementById("searchSummary").style.display = "none";
  document.getElementById("sortBar").classList.remove("visible");

  const searchType = document.querySelector('input[name="searchType"]:checked').value;
  const searchMode = document.querySelector('input[name="searchMode"]:checked').value;

  const start = performance.now();

  try {
    let results = [];

    if (searchType === "title") {
      results = await searchByTitle(q, searchMode);
    } else if (searchType === "body") {
      results = await searchByBody(q, searchMode);
    } else {
      // 全て: タイトル + 本文
      const [titleResults, bodyResults] = await Promise.all([
        searchByTitle(q, searchMode),
        searchByBody(q, searchMode)
      ]);
      // マージ（thread_idで重複除去、bodyResultsがあれば優先）
      const merged = new Map();
      titleResults.forEach(r => merged.set(r.thread_id, r));
      bodyResults.forEach(r => {
        if (merged.has(r.thread_id)) {
          const existing = merged.get(r.thread_id);
          // マッチしたレスをマージ
          const existingNums = new Set(existing.matchedPosts.map(p => p.post_num));
          r.matchedPosts.forEach(p => {
            if (!existingNums.has(p.post_num)) existing.matchedPosts.push(p);
          });
          existing.matchedPosts.sort((a,b) => a.post_num - b.post_num);
        } else {
          merged.set(r.thread_id, r);
        }
      });
      results = Array.from(merged.values());
    }

    const elapsed = ((performance.now() - start) / 1000).toFixed(2);

    currentResults = results;
    applySortAndRender(q, elapsed);

  } catch(e) {
    resultsDiv.innerHTML = `<div class="no-results">エラーが発生しました: ${escapeHtml(e.message)}</div>`;
  }
}

// タイトル検索 -> スレッドごとに返す（matchedPosts = 1レス目）
async function searchByTitle(q, mode) {
  const words = splitWords(q);
  let query = `threads?select=thread_id,title,updated_at&limit=200&order=updated_at.desc`;

  if (mode === "and" || mode === "or" || mode === "default") {
    // シンプルに全wordをilike（AND）か、後でフィルタ
    words.forEach(w => {
      if (mode === "or") return; // OR は後でフィルタ
      query += `&title=ilike.${encodeURIComponent(`%${w}%`)}`;
    });
    if (mode === "or") {
      // OR: 一語ずつ検索してマージ
      const sets = await Promise.all(words.map(w =>
        sbFetch(`threads?select=thread_id,title,updated_at&limit=200&title=ilike.${encodeURIComponent(`%${w}%`)}`)
      ));
      const map = new Map();
      sets.flat().forEach(t => map.set(t.thread_id, t));
      const threads = Array.from(map.values());
      return threads.map(t => ({
        thread_id: t.thread_id, title: t.title,
        updated_at: t.updated_at, matchedPosts: [], titleMatch: true
      }));
    }
  }

  const threads = await sbFetch(query);

  if (mode === "and" && words.length > 1) {
    // クライアントでANDフィルタ
    return threads
      .filter(t => words.every(w => t.title.toLowerCase().includes(w.toLowerCase())))
      .map(t => ({ thread_id: t.thread_id, title: t.title, updated_at: t.updated_at, matchedPosts: [], titleMatch: true }));
  }

  return threads.map(t => ({
    thread_id: t.thread_id, title: t.title, updated_at: t.updated_at, matchedPosts: [], titleMatch: true
  }));
}

// レス本文・名前・ID検索
async function searchByBody(q, mode) {
  const words = splitWords(q);

  // ID検索特別処理
  const idMatch = q.match(/^id:\s*(.+)/i);
  if (idMatch) {
    const targetId = idMatch[1].trim();
    const posts = await sbFetch(
      `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=500&user_id=ilike.${encodeURIComponent(`%${targetId}%`)}&order=posted_at.desc`
    );
    return groupPostsByThread(posts, q);
  }

  let allPosts = [];

  if (mode === "or") {
    // OR: 各ワードで個別に検索してマージ
    const fieldSets = await Promise.all(words.flatMap(w => [
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&body=ilike.${encodeURIComponent(`%${w}%`)}&order=posted_at.desc`),
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&name=ilike.${encodeURIComponent(`%${w}%`)}&order=posted_at.desc`),
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&user_id=ilike.${encodeURIComponent(`%${w}%`)}&order=posted_at.desc`)
    ]));
    const map = new Map();
    fieldSets.flat().forEach(p => map.set(`${p.thread_id}_${p.post_num}`, p));
    allPosts = Array.from(map.values());
  } else {
    // 通常/AND: body・name・user_idで並行検索してマージ
    const mainWord = words[0];
    const [bodyPosts, namePosts, idPosts] = await Promise.all([
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&body=ilike.${encodeURIComponent(`%${mainWord}%`)}&order=posted_at.desc`),
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&name=ilike.${encodeURIComponent(`%${mainWord}%`)}&order=posted_at.desc`),
      sbFetch(`posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&limit=300&user_id=ilike.${encodeURIComponent(`%${mainWord}%`)}&order=posted_at.desc`)
    ]);
    const map = new Map();
    [...bodyPosts, ...namePosts, ...idPosts].forEach(p => map.set(`${p.thread_id}_${p.post_num}`, p));
    allPosts = Array.from(map.values());

    if (mode === "and" && words.length > 1) {
      // AND: 残りワードでクライアントフィルタ
      allPosts = allPosts.filter(p => {
        const text = `${p.body || ""} ${p.name || ""} ${p.user_id || ""}`.toLowerCase();
        return words.every(w => text.includes(w.toLowerCase()));
      });
    }
  }

  return groupPostsByThread(allPosts, q);
}

// レスをthread_idでグループ化
async function groupPostsByThread(posts, q) {
  if (!posts.length) return [];

  // スレッドIDを収集してタイトル取得
  const threadIds = [...new Set(posts.map(p => p.thread_id))];
  const titleMap = new Map();

  // バッチでスレッドタイトルを取得（最大20件ずつ）
  for (let i = 0; i < threadIds.length; i += 20) {
    const batch = threadIds.slice(i, i + 20);
    const threads = await sbFetch(`threads?select=thread_id,title,updated_at&thread_id=in.(${batch.join(",")})`);
    threads.forEach(t => titleMap.set(t.thread_id, t));
  }

  const grouped = new Map();
  posts.forEach(p => {
    if (!grouped.has(p.thread_id)) {
      const t = titleMap.get(p.thread_id) || {};
      grouped.set(p.thread_id, {
        thread_id: p.thread_id,
        title: t.title || `スレッド ${p.thread_id}`,
        updated_at: t.updated_at || p.posted_at,
        matchedPosts: [],
        titleMatch: false
      });
    }
    grouped.get(p.thread_id).matchedPosts.push(p);
  });

  // matchedPostsをpost_num順に
  grouped.forEach(r => r.matchedPosts.sort((a,b) => a.post_num - b.post_num));

  return Array.from(grouped.values());
}

// ===================== ソートと描画 =====================
function applySortAndRender(q, elapsed) {
  const sortOrder = document.querySelector('input[name="sortOrder"]:checked').value;
  const sorted = sortResults([...currentResults], sortOrder);

  const totalMatches = sorted.reduce((s, r) => s + r.matchedPosts.length, 0);
  document.getElementById("resultStats").textContent =
    `約 ${sorted.length} スレッド / ${totalMatches} レス (${elapsed || "0.00"} 秒)`;

  if (sorted.length === 0) {
    document.getElementById("results").innerHTML = `<div class="no-results">「${escapeHtml(q)}」に一致する結果はありませんでした。</div>`;
    document.getElementById("searchSummary").style.display = "none";
    document.getElementById("sortBar").classList.remove("visible");
    return;
  }

  document.getElementById("sortBar").classList.add("visible");

  const summaryDiv = document.getElementById("searchSummary");
  summaryDiv.innerHTML = `<strong>検索:</strong> 「${escapeHtml(q)}」 &nbsp;|&nbsp; <strong>ヒット:</strong> ${sorted.length}スレッド, ${totalMatches}レス`;
  summaryDiv.style.display = "block";

  renderResults(sorted, q);
}

function sortResults(results, order) {
  switch(order) {
    case "newest":
      return results.sort((a,b) => new Date(b.updated_at||0) - new Date(a.updated_at||0));
    case "oldest":
      return results.sort((a,b) => new Date(a.updated_at||0) - new Date(b.updated_at||0));
    case "relevance":
      return results.sort((a,b) => b.matchedPosts.length - a.matchedPosts.length);
  }
  return results;
}

// ===================== 結果描画 =====================
function renderResults(results, q) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  results.forEach(thread => {
    const div = document.createElement("div");
    div.className = "thread-result";

    const date = thread.updated_at ? new Date(thread.updated_at).toLocaleDateString("ja-JP") : "";
    const titleHtml = highlightText(escapeHtml(thread.title || `スレッド ${thread.thread_id}`), q);

    div.innerHTML = `
      <div class="thread-header" onclick="toggleThread(this)">
        <div class="thread-title-area">
          <span class="thread-title">${titleHtml}</span>
          <div class="thread-url">hayabusa.open2ch.net › livejupiter › ${thread.thread_id}</div>
          <div class="thread-meta-line">更新: ${date}${thread.titleMatch && thread.matchedPosts.length === 0 ? ' ・ <span style="color:#34a853;">スレタイ一致</span>' : ''}</div>
        </div>
        <div class="thread-badge-area">
          ${thread.matchedPosts.length > 0 ? `<span class="badge-match">${thread.matchedPosts.length}件ヒット</span>` : '<span class="badge-total" style="color:#34a853;">タイトル一致</span>'}
        </div>
      </div>
      <div class="thread-details"></div>
    `;

    // 詳細エリア
    const detailsDiv = div.querySelector(".thread-details");
    buildThreadDetails(detailsDiv, thread, q);

    container.appendChild(div);
  });
}

function buildThreadDetails(detailsDiv, thread, q) {
  const actionBar = document.createElement("div");
  actionBar.className = "thread-action-bar";
  actionBar.innerHTML = `
    <a class="thread-ext-link" href="https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${thread.thread_id}/" target="_blank" rel="noopener">↗ 元スレを開く</a>
    <button class="btn btn-success btn-sm" onclick="viewFullThread(${thread.thread_id}, event)">全レス表示</button>
    <button class="btn btn-secondary btn-sm" onclick="viewFullThread(${thread.thread_id}, event, true)">別ページで全表示</button>
  `;
  detailsDiv.appendChild(actionBar);

  // マッチしたレスを表示
  const postsWrap = document.createElement("div");
  postsWrap.className = "posts-container";
  detailsDiv.appendChild(postsWrap);

  if (thread.titleMatch && thread.matchedPosts.length === 0) {
    postsWrap.innerHTML = `<p style="color:#5f6368;font-size:13px;padding:8px 0;">スレッドタイトルが一致しました。「全レス表示」でレスを確認できます。</p>`;
  } else {
    thread.matchedPosts.forEach(post => {
      const postDiv = createPostElement(post, thread, q, true);
      postsWrap.appendChild(postDiv);
    });
    addAnchorEvents(postsWrap, thread.thread_id);
  }
}

// ===================== レス要素生成 =====================
function createPostElement(post, threadInfo, q, showRangeButtons) {
  const div = document.createElement("div");
  div.className = "post";
  div.dataset.postNum = post.post_num;

  const date = post.posted_at ? new Date(post.posted_at).toLocaleString("ja-JP") : "";
  const name = post.name || "名無し";
  const nusi = post.is_nusi ? '<span class="post-nusi">主</span>' : "";
  const cleanBody = (post.body || "").trim();
  let bodyHtml = processAnchors(escapeHtml(cleanBody), threadInfo.thread_id);
  bodyHtml = embedMedia(bodyHtml);
  if (q) bodyHtml = highlightText(bodyHtml, q);
  const nameHtml = q ? highlightText(escapeHtml(name), q) : escapeHtml(name);
  const idHtml = q ? highlightText(escapeHtml(post.user_id || ""), q) : escapeHtml(post.user_id || "");

  const rangeButtons = showRangeButtons ? `
    <button class="btn btn-secondary btn-sm range-up-btn" data-post-num="${post.post_num}" onclick="loadRangePosts(this,'up',${threadInfo.thread_id},'${escapeAttr(q)}')">上100</button>
    <button class="btn btn-secondary btn-sm range-down-btn" data-post-num="${post.post_num}" onclick="loadRangePosts(this,'down',${threadInfo.thread_id},'${escapeAttr(q)}')">下100</button>
  ` : "";

  div.innerHTML = `
    <div class="post-meta">
      <span class="post-num" onclick="openPostInThread(${threadInfo.thread_id}, ${post.post_num})">${post.post_num}</span>
      <span class="post-author">${nameHtml}</span>${nusi}
      <span class="post-id">ID:${idHtml}</span>
      <span class="post-time">${date}</span>
      <div class="post-buttons">
        ${rangeButtons}
        <button class="btn btn-copy btn-sm" onclick="copyPost(this, '${escapeAttr(`${post.post_num}: ${name} | ID:${post.user_id || ''} | ${date}\n${cleanBody}`)}')" >コピペ</button>
      </div>
    </div>
    <div class="post-content">${bodyHtml}</div>
  `;
  return div;
}

// ===================== スレッド内全レス表示 =====================
async function viewFullThread(threadId, event, newPage) {
  if (event) event.stopPropagation();

  if (newPage) {
    // 別ページモード
    showDetailPage(threadId);
    return;
  }

  // インライン全表示: スレッドカードの中に展開
  const cards = document.querySelectorAll(".thread-result");
  let targetCard = null;
  cards.forEach(c => {
    const header = c.querySelector(".thread-header");
    if (header && c.querySelector(`.thread-details`)) {
      // thread_idを特定する（URLから）
      const urlDiv = c.querySelector(".thread-url");
      if (urlDiv && urlDiv.textContent.includes(String(threadId))) {
        targetCard = c;
      }
    }
  });

  if (!targetCard) return;

  const detailsDiv = targetCard.querySelector(".thread-details");
  detailsDiv.style.display = "block";

  const postsWrap = detailsDiv.querySelector(".posts-container");
  postsWrap.innerHTML = `<div class="loading">全レス読み込み中… <span class="spinner"></span></div>`;

  const posts = await fetchAllPosts(threadId);
  const threadInfo = { thread_id: threadId };
  const q = document.getElementById("resultInput").value.trim();

  postsWrap.innerHTML = `<div style="font-size:13px;color:#5f6368;padding:4px 0;">${posts.length}レス</div>`;
  posts.forEach(p => {
    const el = createPostElement(p, threadInfo, q, false);
    postsWrap.appendChild(el);
  });
  addAnchorEvents(postsWrap, threadId);

  // 全レス表示ボタンを非表示
  const btn = detailsDiv.querySelector(".btn-success");
  if (btn) btn.style.display = "none";
}

// ===================== スレッド詳細ページ =====================
async function showDetailPage(threadId) {
  document.getElementById("resultPage").classList.remove("active");
  document.getElementById("threadDetailPage").classList.add("active");
  currentThreadId = threadId;

  const postsDiv = document.getElementById("threadDetailPosts");
  postsDiv.innerHTML = `<div class="loading">読み込み中… <span class="spinner"></span></div>`;

  const [threadArr, posts] = await Promise.all([
    sbFetch(`threads?select=thread_id,title,updated_at&thread_id=eq.${threadId}&limit=1`),
    fetchAllPosts(threadId)
  ]);

  const thread = threadArr[0] || { thread_id: threadId, title: `スレッド ${threadId}` };
  const q = document.getElementById("detailInput").value.trim();

  postsDiv.innerHTML = `
    <div class="back-btn" onclick="goBack()">← 検索結果に戻る</div>
    <h2 style="font-size:17px;font-weight:700;color:#202124;padding:8px 0 4px;">${escapeHtml(thread.title)}</h2>
    <div style="font-size:13px;color:#5f6368;margin-bottom:12px;">${posts.length}レス</div>
    <a href="https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${threadId}/" target="_blank" style="font-size:13px;color:#1a73e8;text-decoration:none;">↗ 元スレを開く</a>
  `;

  const container = document.createElement("div");
  container.className = "posts-container";
  posts.forEach(p => {
    const el = createPostElement(p, thread, q, false);
    container.appendChild(el);
  });
  postsDiv.appendChild(container);
  addAnchorEvents(container, threadId);
}

// ===================== レス範囲読み込み =====================
async function loadRangePosts(btn, direction, threadId, q) {
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = "読込中…";

  const postNum = parseInt(btn.dataset.postNum);
  let startNum, endNum;
  if (direction === "up") {
    startNum = Math.max(1, postNum - 100);
    endNum = postNum - 1;
  } else {
    startNum = postNum + 1;
    endNum = postNum + 100;
  }

  if (startNum > endNum) {
    btn.textContent = origText;
    btn.disabled = false;
    return;
  }

  const posts = await sbFetch(
    `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&thread_id=eq.${threadId}&post_num=gte.${startNum}&post_num=lte.${endNum}&order=post_num.asc`
  );

  const container = document.createElement("div");
  container.className = `range-posts`;
  const threadInfo = { thread_id: threadId };

  posts.forEach(p => {
    const el = createPostElement(p, threadInfo, q, false);
    container.appendChild(el);
  });
  addAnchorEvents(container, threadId);

  const postDiv = btn.closest(".post");
  if (direction === "up") {
    const scrollY = window.scrollY;
    const rect = postDiv.getBoundingClientRect();
    postDiv.parentNode.insertBefore(container, postDiv);
    // スクロール位置補正
    const newRect = postDiv.getBoundingClientRect();
    window.scrollTo(0, scrollY + (newRect.top - rect.top));
  } else {
    postDiv.parentNode.insertBefore(container, postDiv.nextSibling);
  }

  btn.textContent = origText;
  // ボタンは無効化したまま（連打防止）
}

// ===================== 全レス取得（キャッシュ付き） =====================
async function fetchAllPosts(threadId) {
  if (threadCache.has(threadId)) return threadCache.get(threadId);
  const posts = await sbFetch(
    `posts?select=thread_id,post_num,user_id,name,posted_at,body,is_nusi&thread_id=eq.${threadId}&order=post_num.asc&limit=2000`
  );
  threadCache.set(threadId, posts);
  return posts;
}

// ===================== 安価処理 =====================
function processAnchors(html, threadId) {
  return html.replace(/(&gt;&gt;|&gt;)(\d+)/g, (match, gt, num) => {
    return `<span class="anchor-link" data-post-num="${num}" data-thread-id="${threadId}">${match}</span>`;
  });
}

// 安価イベント登録
function addAnchorEvents(container, threadId) {
  const preview = document.getElementById("anchorPreview");
  container.querySelectorAll(".anchor-link").forEach(link => {
    link.addEventListener("mouseenter", async (e) => {
      const postNum = parseInt(e.target.dataset.postNum);
      const tid = parseInt(e.target.dataset.threadId);

      const posts = await fetchAllPosts(tid).catch(() => []);
      const post = posts.find(p => p.post_num === postNum);
      if (!post) return;

      const cleanBody = (post.body || "").trim().substring(0, 200);
      preview.innerHTML = `
        <div class="preview-meta">${postNum}: ${escapeHtml(post.name || "名無し")} | ID:${escapeHtml(post.user_id || "")}</div>
        <div class="preview-body">${escapeHtml(cleanBody)}${(post.body||"").length > 200 ? "…" : ""}</div>
      `;
      preview.style.display = "block";
      positionPreview(e);
    });

    link.addEventListener("mousemove", (e) => positionPreview(e));

    link.addEventListener("mouseleave", () => {
      preview.style.display = "none";
    });

    link.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const postNum = parseInt(e.target.dataset.postNum);
      const tid = parseInt(e.target.dataset.threadId);
      scrollToOrShowPost(postNum, tid, container);
    });
  });
}

function positionPreview(e) {
  const preview = document.getElementById("anchorPreview");
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 12, y = e.clientY - 10;
  preview.style.left = "";
  preview.style.right = "";
  preview.style.top = "";
  preview.style.bottom = "";
  if (x + 380 > vw) x = e.clientX - 392;
  if (y + preview.offsetHeight > vh) y = e.clientY - preview.offsetHeight - 10;
  preview.style.left = Math.max(4, x) + "px";
  preview.style.top = Math.max(4, y) + "px";
}

async function scrollToOrShowPost(postNum, threadId, container) {
  // 既に表示されているか確認
  const existing = container.querySelector(`[data-post-num="${postNum}"]`);
  if (existing && existing.classList.contains("post")) {
    existing.scrollIntoView({ behavior: "smooth", block: "center" });
    existing.style.background = "#fffde7";
    setTimeout(() => existing.style.background = "", 1500);
    return;
  }
  // なければ取得して挿入
  const posts = await fetchAllPosts(threadId);
  const post = posts.find(p => p.post_num === postNum);
  if (!post) return;
  const el = createPostElement(post, { thread_id: threadId }, currentKeyword, false);
  el.style.background = "#fffde7";
  container.appendChild(el);
  setTimeout(() => el.style.background = "", 1500);
  el.scrollIntoView({ behavior: "smooth", block: "center" });
  addAnchorEvents(el, threadId);
}

// ===================== メディア埋め込み =====================
function embedMedia(html) {
  // imgur
  html = html.replace(/https?:\/\/(?:i\.)?imgur\.com\/([a-zA-Z0-9]+)(?:\.[a-zA-Z]+)?/g, (url, id) => {
    return `<div class="media-embed"><img src="https://i.imgur.com/${id}.jpg" loading="lazy" onerror="this.parentElement.style.display='none'"></div>${url}`;
  });
  // YouTube
  html = html.replace(/https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/g, (url, vid) => {
    return `<div class="media-embed"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen loading="lazy"></iframe></div>${url}`;
  });
  return html;
}

// ===================== ユーティリティ =====================
function splitWords(q) {
  return q.split(/\s+/).filter(Boolean);
}

function highlightText(html, q) {
  if (!q) return html;
  // ID検索なら対象を変える
  const idMatch = q.match(/^id:\s*(.+)/i);
  const term = idMatch ? idMatch[1].trim() : q;
  const words = splitWords(term);
  words.forEach(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(`(${escaped})`, "gi");
    html = html.replace(re, '<span class="highlight">$1</span>');
  });
  return html;
}

function escapeHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escapeAttr(s) {
  if (!s) return "";
  return s.replace(/'/g, "\\'").replace(/\n/g, "\\n");
}

function openPostInThread(threadId, postNum) {
  window.open(`https://hayabusa.open2ch.net/test/read.cgi/livejupiter/${threadId}/${postNum}-`, "_blank");
}

async function copyPost(btn, text) {
  const decoded = text.replace(/\\n/g, "\n");
  try {
    await navigator.clipboard.writeText(decoded);
    btn.textContent = "コピー完了!";
    setTimeout(() => btn.textContent = "コピペ", 1200);
  } catch {
    prompt("コピーしてください:", decoded);
  }
}

function toggleThread(headerEl) {
  const details = headerEl.nextElementSibling;
  details.style.display = details.style.display === "block" ? "none" : "block";
}

function goHome() {
  document.getElementById("topPage").classList.remove("hidden");
  document.getElementById("resultPage").classList.remove("active");
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("topInput").value = "";
  document.getElementById("topInput").focus();
  currentResults = [];
  currentKeyword = "";
}

function goBack() {
  document.getElementById("threadDetailPage").classList.remove("active");
  document.getElementById("resultPage").classList.add("active");
}

// ===================== イベント登録 =====================
document.getElementById("topInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});
document.getElementById("resultInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch(e.target.value.trim());
});
document.getElementById("detailInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch(e.target.value.trim());
});

// ソート変更
document.querySelectorAll('input[name="sortOrder"]').forEach(r => {
  r.addEventListener("change", () => {
    if (currentResults.length > 0) {
      const elapsed = "0.00";
      applySortAndRender(currentKeyword, elapsed);
    }
  });
});

// 検索モード・範囲変更で再検索
document.querySelectorAll('input[name="searchMode"], input[name="searchType"]').forEach(r => {
  r.addEventListener("change", () => {
    const q = document.getElementById("resultInput").value.trim();
    if (q) doSearch(q);
  });
});
