<style>
/* ===== ランキングページ専用スタイル ===== */
.ranking-page {
  min-height: 100vh;
  background: #fff;
}

.ranking-header {
display: flex;
align-items: center;
padding: 12px 20px;
border-bottom: 1px solid #ebebeb;
position: sticky;
top: 0;
background: #fff;
z-index: 100;
gap: 16px;
}

.ranking-logo {
font-size: 28px;
font-weight: bold;
cursor: pointer;
white-space: nowrap;
font-family: Arial, sans-serif;
flex-shrink: 0;
text-decoration: none;
}
.ranking-logo span:nth-child(1){color:#4285F4}
.ranking-logo span:nth-child(2){color:#EA4335}
.ranking-logo span:nth-child(3){color:#FBBC05}
.ranking-logo span:nth-child(4){color:#4285F4}
.ranking-logo span:nth-child(5){color:#34A853}
.ranking-logo span:nth-child(6){color:#EA4335}
.ranking-logo span:nth-child(7){color:#FBBC05}

.ranking-header-title {
font-size: 18px;
font-weight: 700;
color: #202124;
flex: 1;
}

.ranking-body {
max-width: 760px;
margin: 0 auto;
padding: 20px 16px 60px;
}

/* 日付選択エリア */
.date-selector {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 20px;
flex-wrap: wrap;
}

.date-label {
font-size: 14px;
color: #5f6368;
font-weight: 600;
}

.date-nav-btn {
background: #f1f3f4;
border: 1px solid #dadce0;
border-radius: 50%;
width: 32px;
height: 32px;
cursor: pointer;
font-size: 16px;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.12s;
flex-shrink: 0;
}
.date-nav-btn:hover { background: #e8eaed; }
.date-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.date-display {
font-size: 16px;
font-weight: 700;
color: #202124;
min-width: 130px;
text-align: center;
}

.date-input-btn {
background: none;
border: 1px solid #dadce0;
border-radius: 16px;
padding: 4px 12px;
font-size: 13px;
color: #5f6368;
cursor: pointer;
font-family: inherit;
}
.date-input-btn:hover { background: #f1f3f4; }

/* カレンダーピッカー */
.date-picker-wrap {
display: none;
align-items: center;
gap: 6px;
}
.date-picker-wrap.visible { display: flex; }
.date-picker-wrap input[type=“date”] {
border: 1px solid #dadce0;
border-radius: 4px;
padding: 4px 8px;
font-size: 13px;
font-family: inherit;
color: #3c4043;
}
.date-picker-wrap input[type=“date”]:focus {
border-color: #1a73e8;
outline: none;
}

/* ランキングタイトル */
.ranking-title-bar {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
flex-wrap: wrap;
gap: 8px;
}

.ranking-title {
font-size: 15px;
font-weight: 700;
color: #202124;
}

.ranking-stats {
font-size: 13px;
color: #70757a;
}

/* テーブル */
.ranking-table {
width: 100%;
border-collapse: collapse;
background: #fff;
border: 1px solid #dadce0;
border-radius: 8px;
overflow: hidden;
}

.ranking-table th {
background: #f8f9fa;
padding: 10px 14px;
text-align: left;
font-size: 12px;
font-weight: 700;
color: #5f6368;
border-bottom: 1px solid #ebebeb;
}

.ranking-table th.col-rank { width: 52px; text-align: center; }
.ranking-table th.col-count { width: 90px; text-align: right; }

.ranking-table td {
padding: 10px 14px;
border-bottom: 1px solid #f1f3f4;
font-size: 14px;
vertical-align: middle;
}

.ranking-table tr:last-child td { border-bottom: none; }

.ranking-table tr:hover td { background: #f8f9fa; }

/* 順位 */
.rank-cell {
text-align: center;
font-weight: 700;
font-size: 14px;
}
.rank-medal {
font-size: 18px;
}

/* ID列 */
.rank-id {
font-family: ‘Courier New’, monospace;
color: #1a73e8;
cursor: pointer;
font-weight: 600;
transition: color 0.1s;
}
.rank-id:hover { color: #1557b0; text-decoration: underline; }

/* 件数 */
.count-cell {
text-align: right;
font-weight: 700;
color: #202124;
}

/* バー */
.bar-cell { min-width: 120px; }
.bar-bg {
background: #f1f3f4;
border-radius: 4px;
height: 8px;
overflow: hidden;
}
.bar-fill {
height: 100%;
background: linear-gradient(90deg, #1a73e8, #34a853);
border-radius: 4px;
transition: width 0.5s ease;
}

/* ローディング / エラー */
.rk-loading {
text-align: center;
padding: 48px;
color: #70757a;
font-size: 14px;
}
.rk-spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 2px solid #e0e0e0;
border-radius: 50%;
border-top-color: #1a73e8;
animation: spin 0.8s linear infinite;
margin-left: 8px;
vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.rk-empty {
text-align: center;
padding: 48px;
color: #70757a;
font-size: 14px;
}

.rk-error {
color: #c0392b;
padding: 24px;
font-size: 14px;
text-align: center;
}

/* 注意書き */
.rk-note {
font-size: 12px;
color: #70757a;
margin-top: 12px;
padding: 8px 12px;
background: #f8f9fa;
border-radius: 4px;
border-left: 3px solid #fbbc05;
}

@media (max-width: 600px) {
.ranking-header { padding: 8px 12px; gap: 8px; }
.ranking-logo { font-size: 22px; }
.ranking-body { padding: 12px 10px 60px; }
.bar-cell { display: none; }
.ranking-table th.col-bar,
.ranking-table td.bar-cell { display: none; }
}
</style>

</head>

<!-- ランキング本体 -->
<div id="rankingContent">
  <div class="rk-loading">読み込み中… <span class="rk-spinner"></span></div>
</div>

<div class="rk-note" id="rkNote" style="display:none;">
  ※ ランキングは 2026/04/25 以降のデータを表示します。<br>
  ※ IDをタップすると該当IDのレスを検索します。

<script>
"use strict";

const SB_URL2 = "https://magmwtxzsbguzpoosjof.supabase.co";
const SB_KEY2 = "sb_publishable_OyXecLIdNaCUJo2Mry2WOQ_wXt20zTm";

const EARLIEST = new Date(2026, 3, 25); // 2026-04-25

let currentDate = new Date();
// 今日を初期値に（時刻リセット）
currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
// EARLIESTより前なら EARLIEST に
if (currentDate < EARLIEST) currentDate = new Date(EARLIEST);

function toISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

function toJaDisplay(d) {
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const dd = d.getDate();
  const dow = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${y}年${m}月${dd}日 (${dow})`;
}

function toInputVal(d) {
  return toISO(d);
}

function updateDateDisplay() {
  document.getElementById("dateDisplay").textContent = toJaDisplay(currentDate);
  document.getElementById("prevDay").disabled = currentDate <= EARLIEST;
  const today = new Date();
  const todayD = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  document.getElementById("nextDay").disabled = currentDate >= todayD;
  document.getElementById("datePicker").value = toInputVal(currentDate);
}

async function loadRanking(date) {
  const content = document.getElementById("rankingContent");
  content.innerHTML = '<div class="rk-loading">読み込み中… <span class="rk-spinner"></span></div>';
  document.getElementById("rkNote").style.display = "none";

  const dateStr = toISO(date);

  try {
    const res = await fetch(
      `${SB_URL2}/rest/v1/id_rankings?select=rank,user_id,post_count&date=eq.${dateStr}&order=rank.asc&limit=100`,
      { headers: { "apikey": SB_KEY2, "Authorization": "Bearer " + SB_KEY2 } }
    );

    if (!res.ok) {
      const errText = await res.text();
      throw new Error("HTTP " + res.status + ": " + errText);
    }

    const rows = await res.json();

    if (!rows.length) {
      content.innerHTML = '<div class="rk-empty">この日のランキングデータはありません。</div>';
      document.getElementById("rkNote").style.display = "";
      return;
    }

    const maxCount = rows[0].post_count || 1;

    let html = `
      <div class="ranking-title-bar">
        <div class="ranking-title">${toJaDisplay(date)} のランキング</div>
        <div class="ranking-stats">全 ${rows.length} 件</div>
      </div>
      <table class="ranking-table">
        <thead>
          <tr>
            <th class="col-rank">順位</th>
            <th>ID</th>
            <th class="col-count">書込数</th>
            <th class="col-bar">割合</th>
          </tr>
        </thead>
        <tbody>
    `;

    rows.forEach(row => {
      const medal = row.rank === 1 ? "🥇" : row.rank === 2 ? "🥈" : row.rank === 3 ? "🥉" : "";
      const pct = Math.round((row.post_count / maxCount) * 100);
      const safeId = escHtml(row.user_id || "");

      html += `
        <tr>
          <td class="rank-cell">${medal ? `<span class="rank-medal">${medal}</span>` : row.rank}</td>
          <td><span class="rank-id" data-userid="${safeId}" title="クリックで検索">${safeId}</span></td>
          <td class="count-cell">${row.post_count}</td>
          <td class="bar-cell">
            <div class="bar-bg">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>
          </td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    content.innerHTML = html;
    document.getElementById("rkNote").style.display = "";

    // IDクリック → Jeegle検索
    content.querySelectorAll(".rank-id").forEach(el => {
      el.addEventListener("click", () => {
        const uid = el.dataset.userid;
        if (!uid) return;
        // index.html に id: 検索で飛ぶ
        const url = new URL("index.html", location.href);
        url.searchParams.set("s", "id:" + uid);
        url.searchParams.set("t", "h");
        url.searchParams.set("m", "t");
        // 当日のYYMMDD
        const yy = String(date.getFullYear()).slice(2).padStart(2,"0");
        const mm = String(date.getMonth()+1).padStart(2,"0");
        const dd2= String(date.getDate()).padStart(2,"0");
        url.searchParams.set("d", yy+mm+dd2);
        location.href = url.toString();
      });
    });

  } catch (e) {
    content.innerHTML = `<div class="rk-error">読み込みエラー: ${escHtml(e.message)}</div>`;
    document.getElementById("rkNote").style.display = "";
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// 前日
document.getElementById("prevDay").addEventListener("click", () => {
  const d = new Date(currentDate);
  d.setDate(d.getDate() - 1);
  if (d < EARLIEST) return;
  currentDate = d;
  updateDateDisplay();
  loadRanking(currentDate);
});

// 翌日
document.getElementById("nextDay").addEventListener("click", () => {
  const today = new Date();
  const todayD = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const d = new Date(currentDate);
  d.setDate(d.getDate() + 1);
  if (d > todayD) return;
  currentDate = d;
  updateDateDisplay();
  loadRanking(currentDate);
});

// 日付指定トグル
document.getElementById("togglePicker").addEventListener("click", () => {
  const wrap = document.getElementById("datePickerWrap");
  wrap.classList.toggle("visible");
});

// カレンダー変更
document.getElementById("datePicker").addEventListener("change", e => {
  const v = e.target.value; // "YYYY-MM-DD"
  if (!v) return;
  const parts = v.split("-");
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  if (d < EARLIEST) {
    alert("2026年4月25日以前のデータはありません。");
    return;
  }
  const today = new Date();
  const todayD = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  if (d > todayD) {
    alert("未来の日付は選択できません。");
    return;
  }
  currentDate = d;
  document.getElementById("datePickerWrap").classList.remove("visible");
  updateDateDisplay();
  loadRanking(currentDate);
});

// 初期化
updateDateDisplay();
loadRanking(currentDate);
</script>

</body>
